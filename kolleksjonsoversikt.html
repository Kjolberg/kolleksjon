<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kolleksjonsoversikt – Royal Solskjerming</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bc-dark:    #223142;
  --bc-dark-80: #4a5a6d;
  --bc-dark-10: #eaecef;
  --bc-ocre:    #E8593C;
  --bc-ocre-h:  #d04832;
  --bc-ocre-bg: #fdf1ee;
  --bc-green:   #5FA643;
  --bc-green-bg:#edf7e9;
  --bc-lblue:   #5DCAA5;
  --bc-lblue-bg:#e8f8f3;
  --bc-blue:    #2078A0;
  --bc-yellow:  #D4A023;
  --bc-yellow-bg:#fdf6e3;
  --bc-purple:  #922849;
  --bg:     #F4F5F7;
  --surf:   #ffffff;
  --border: #dde1e7;
  --t1:     #223142;
  --t2:     #4a5a6d;
  --tm:     #8a96a3;
  --sh:     0 1px 4px rgba(34,49,66,.08);
  --shm:    0 4px 16px rgba(34,49,66,.12);
  --r:      4px;
  --r2:     8px;
  --hh:     60px;
  --sw:     224px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito Sans','Segoe UI',sans-serif;background:var(--bg);color:var(--t1);font-size:13.5px;line-height:1.55;min-height:100vh}

/* HEADER */
.hdr{background:var(--bc-dark);height:var(--hh);padding:0 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(34,49,66,.25)}
.hdr-title{font-size:15px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#fff;display:flex;align-items:center;gap:10px}
.hdr-title::before{content:'';width:5px;height:20px;background:var(--bc-ocre);border-radius:2px;flex-shrink:0}
.hdr-right{display:flex;align-items:center;gap:10px}
.hdr-meta{font-size:10.5px;color:rgba(255,255,255,.4)}
.sync{font-size:10px;color:rgba(255,255,255,.3)}
.sync.ok{color:var(--bc-green)}.sync.err{color:var(--bc-ocre)}
.hdr-btn{background:transparent;border:1px solid rgba(255,255,255,.3);border-radius:var(--r);height:32px;padding:0 14px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;color:rgba(255,255,255,.75);letter-spacing:.03em;transition:all .2s}
.hdr-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.hdr-btn.on{background:var(--bc-ocre);border-color:var(--bc-ocre);color:#fff}

/* LAYOUT */
.body{display:flex;min-height:calc(100vh - var(--hh))}

/* SIDEBAR */
.sb{width:var(--sw);background:var(--surf);border-right:1px solid var(--border);padding:16px 0 32px;position:sticky;top:var(--hh);height:calc(100vh - var(--hh));overflow-y:auto;flex-shrink:0}
.sb-group-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--tm);padding:12px 18px 4px}
.sb-item{display:flex;align-items:center;justify-content:space-between;padding:8px 18px;cursor:pointer;color:var(--t2);font-size:12.5px;transition:all .15s;border-left:3px solid transparent}
.sb-item:hover{background:var(--bc-dark-10);color:var(--t1)}
.sb-item.on{background:var(--bc-ocre-bg);color:var(--bc-ocre);border-left-color:var(--bc-ocre);font-weight:700}
.sb-count{font-size:10px;font-weight:600;background:var(--bg);color:var(--tm);border-radius:10px;padding:1px 7px;border:1px solid var(--border)}
.sb-item.on .sb-count{background:var(--bc-ocre-bg);border-color:rgba(232,89,60,.2);color:var(--bc-ocre)}

/* MAIN */
.main{flex:1;padding:24px 28px;min-width:0}

/* ADMIN PANEL */
.adm-panel{display:none;background:var(--surf);border:1px solid var(--border);border-left:3px solid var(--bc-ocre);border-radius:var(--r);padding:12px 16px;margin-bottom:16px;gap:8px;align-items:center;flex-wrap:wrap}
.adm-panel.on{display:flex}
.adm-lbl{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--bc-ocre)}

/* ADD FORM */
.add-form{display:none;background:var(--surf);border:1px solid var(--border);border-left:3px solid var(--bc-blue);border-radius:var(--r);padding:20px;margin-bottom:16px}
.add-form.on{display:block}
.add-form h3{font-size:15px;font-weight:700;color:var(--t1);margin-bottom:14px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
.ff label{display:block;font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--tm);margin-bottom:4px}
.ff input,.ff select{width:100%;border:1px solid var(--border);border-radius:var(--r);padding:0 10px;height:36px;font-family:inherit;font-size:13px;background:var(--bg)}
.ff input:focus,.ff select:focus{outline:none;border-color:var(--bc-blue);box-shadow:0 0 0 3px rgba(32,120,160,.12)}

/* BUTTONS */
.btn-p{background:var(--bc-ocre);color:#fff;border:none;border-radius:var(--r);height:36px;padding:0 18px;font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer;transition:background .2s}
.btn-p:hover{background:var(--bc-ocre-h)}
.btn-s{background:transparent;color:var(--t2);border:1px solid var(--border);border-radius:var(--r);height:36px;padding:0 14px;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-s:hover{border-color:var(--bc-dark-80);color:var(--t1)}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(34,49,66,.55);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-bg.on{display:flex}
.modal{background:var(--surf);border-radius:var(--r2);padding:32px;width:400px;max-width:92vw;box-shadow:var(--shm);border-top:3px solid var(--bc-ocre)}
.modal h2{font-size:18px;font-weight:700;color:var(--t1);margin-bottom:6px}
.modal p{font-size:12px;color:var(--tm);margin-bottom:16px}
.modal input{width:100%;border:1px solid var(--border);border-radius:var(--r);padding:0 12px;height:36px;font-family:inherit;font-size:13px;background:var(--bg);margin-bottom:10px}
.modal input:focus{outline:none;border-color:var(--bc-blue)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}
.err-msg{color:var(--bc-ocre);font-size:12px;font-weight:600}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.search-wrap{flex:1;min-width:180px;max-width:320px;position:relative}
.search-wrap input{width:100%;border:1px solid var(--border);border-radius:var(--r);height:36px;padding:0 12px 0 34px;font-family:inherit;font-size:13px;background:var(--surf)}
.search-wrap input:focus{outline:none;border-color:var(--bc-blue);box-shadow:0 0 0 3px rgba(32,120,160,.12)}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--tm);pointer-events:none}
.f-btns{display:flex;gap:3px}
.f-btn{height:36px;padding:0 13px;border:1px solid var(--border);border-radius:var(--r);font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;background:var(--surf);color:var(--t2);transition:all .15s}
.f-btn:hover{border-color:var(--bc-dark-80);color:var(--t1)}
.f-btn.on{background:var(--bc-dark);color:#fff;border-color:var(--bc-dark)}

/* CAT HEADER */
.cat-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:12px;border-bottom:2px solid var(--bc-dark-10)}
.cat-hdr h2{font-size:21px;font-weight:700;color:var(--t1)}
.cat-hdr span{font-size:11.5px;color:var(--tm);padding:2px 10px;background:var(--bc-dark-10);border-radius:12px}

/* TABLE */
.tbl-wrap{background:var(--surf);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;overflow-x:auto;box-shadow:var(--sh)}
table{width:100%;border-collapse:collapse;min-width:700px}
thead tr{background:var(--bc-dark)}
thead th{padding:10px 13px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.6);white-space:nowrap;cursor:default}
thead th.sort{cursor:pointer}
thead th.sort:hover{color:#fff}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bc-dark-10)}
tbody tr.disc{opacity:.55}
td{padding:9px 13px;font-size:13px;color:var(--t2);vertical-align:middle}
td.num{font-weight:700;color:var(--t1)}
.tbl-footer{margin-top:8px;font-size:11px;color:var(--tm)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:12px;font-size:10.5px;font-weight:700;white-space:nowrap}
.b-act{background:var(--bc-green-bg);color:var(--bc-green)}
.b-dis{background:var(--bc-ocre-bg);color:var(--bc-ocre)}
.b-pri{background:var(--bc-dark-10);color:var(--bc-dark)}
.certs{display:flex;flex-wrap:wrap;gap:3px}
.cert{font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:3px;white-space:nowrap}
.c-oeko{background:var(--bc-lblue-bg);color:var(--bc-lblue)}
.c-gg{background:var(--bc-green-bg);color:var(--bc-green)}
.c-c2c{background:#e8f2f9;color:var(--bc-blue)}
.c-fl{background:var(--bc-yellow-bg);color:var(--bc-yellow)}
.c-hu{background:#edf3f9;color:var(--bc-blue)}
.c-sc{background:#f3eaf1;color:var(--bc-purple)}
.c-su{background:var(--bc-green-bg);color:var(--bc-green)}

/* TOGGLE BTNS */
.t-btn{font-size:11px;padding:0 9px;height:28px;border-radius:var(--r);cursor:pointer;border:1px solid;font-family:inherit;font-weight:700;transition:all .15s}
.t-act{border-color:var(--bc-ocre);color:var(--bc-ocre);background:none}
.t-act:hover{background:var(--bc-ocre-bg)}
.t-dis{border-color:var(--bc-green);color:var(--bc-green);background:none}
.t-dis:hover{background:var(--bc-green-bg)}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--tm)}

/* NOTIFICATION */
.notif{position:fixed;bottom:22px;right:22px;background:var(--bc-dark);color:#fff;padding:10px 18px;border-radius:var(--r);font-size:13px;font-weight:600;border-left:3px solid var(--bc-ocre);transform:translateY(60px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);z-index:2000;box-shadow:var(--shm)}
.notif.on{transform:translateY(0);opacity:1}

@media(max-width:860px){.sb{display:none}.main{padding:16px}}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-title">Kolleksjonsoversikt</div>
  <div class="hdr-right">
    <span class="hdr-meta" id="lastUpdated"></span>
    <span class="sync" id="syncDot"></span>
    <button class="hdr-btn" id="langBtn" onclick="toggleLang()">🇬🇧 EN</button>
    <button class="hdr-btn" id="adminBtn" onclick="toggleAdminLogin()">Admin</button>
  </div>
</header>

<div class="body">
  <nav class="sb" id="sidebar"></nav>
  <main class="main">

    <div class="adm-panel" id="adminPanel">
      <span class="adm-lbl" id="lbl_admin">Admin</span>
      <button class="btn-p" id="btn_add" onclick="showAddForm()" style="font-size:12px;height:32px;padding:0 12px">+ Legg til duk</button>
      <button class="btn-s" id="btn_export" style="font-size:12px;height:32px" onclick="exportData()">↓ Eksporter JSON</button>
      <label class="btn-s" id="btn_import" style="font-size:12px;height:32px;cursor:pointer;display:flex;align-items:center">
        ↑ Importer JSON <input type="file" accept=".json" onchange="importData(event)" style="display:none">
      </label>
      <button class="btn-s" id="btn_reset" style="font-size:12px;height:32px;color:var(--bc-ocre)" onclick="confirmReset()">Tilbakestill</button>
      <span style="font-size:11px;color:var(--tm);margin-left:auto">🔒 <a href="#" onclick="logout()" style="color:var(--bc-ocre)" id="btn_logout">Logg ut</a></span>
    </div>

    <div class="add-form" id="addForm">
      <h3 id="form_title">Legg til ny duk</h3>
      <div class="form-grid">
        <div class="ff"><label id="fl_num">Dessinnummer *</label><input id="nf_num" placeholder="f.eks. 41600"></div>
        <div class="ff"><label id="fl_pri">Prisgruppe</label><input id="nf_price" placeholder="A, B, C..."></div>
        <div class="ff"><label id="fl_mat">Materiale</label><input id="nf_comp" placeholder="100% PES"></div>
        <div class="ff"><label id="fl_col">Farge</label><input id="nf_color" placeholder="hvid, beige..."></div>
        <div class="ff"><label id="fl_lt">Lystransmission</label><input id="nf_lt" type="number" min="0" max="1" step="0.01" placeholder="0.00–1.00"></div>
        <div class="ff"><label id="fl_st">Status</label>
          <select id="nf_status"><option value="active" id="fo_act">Aktiv</option><option value="discontinued" id="fo_dis">Utgått</option></select>
        </div>
      </div>
      <div style="margin-top:14px;display:flex;gap:8px">
        <button class="btn-p" id="btn_save" onclick="addNewItem()">Lagre</button>
        <button class="btn-s" id="btn_cancel" onclick="hideAddForm()">Avbryt</button>
      </div>
    </div>

    <div id="mainArea"></div>
  </main>
</div>

<div class="modal-bg" id="loginModal">
  <div class="modal">
    <h2 id="modal_title">Admin-tilgang</h2>
    <p id="modal_desc">Skriv inn passord for å redigere kolleksjonen.</p>
    <input type="password" id="adminPw" placeholder="Passord" onkeydown="if(event.key==='Enter')checkPw()">
    <div class="err-msg" id="pwErr" style="display:none">Feil passord. Prøv igjen.</div>
    <div class="modal-actions">
      <button class="btn-s" id="modal_cancel" onclick="closeModal()">Avbryt</button>
      <button class="btn-p" id="modal_login" onclick="checkPw()">Logg inn</button>
    </div>
  </div>
</div>

<div class="notif" id="notif"></div>

// ── Supabase ─────────────────────────────────────────────────
async function sbFetch(path, opts={}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    ...opts,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || '',
    }
  });
  if (!res.ok) throw new Error(await res.text());
  const txt = await res.text();
  return txt ? JSON.parse(txt) : null;
}

async function loadFromSupabase() {
  const rows = await sbFetch('fabric_status?select=id,status');
  remoteStatus = {};
  (rows || []).forEach(r => { remoteStatus[r.id] = r.status; });
  supabaseReady = true;
  if (!rows || rows.length === 0) {
    await seedToSupabase();
  }
}

async function seedToSupabase() {
  const rows = DISC_IDS_FROM_EXCEL.map(id => ({id, status:'discontinued'}));
  for (let i = 0; i < rows.length; i += 100) {
    await sbFetch('fabric_status', {
      method:'POST', prefer:'resolution=ignore-duplicates',
      body: JSON.stringify(rows.slice(i, i+100))
    });
  }
  DISC_IDS_FROM_EXCEL.forEach(id => { remoteStatus[id] = 'discontinued'; });
}

async function saveToSupabase(id, status) {
  await sbFetch('fabric_status', {
    method:'POST', prefer:'resolution=merge-duplicates',
    body: JSON.stringify([{id, status, updated_at: new Date().toISOString()}])
  });
  remoteStatus[id] = status;
}

function saveLocal() {
  localStorage.setItem('royal_v3', JSON.stringify(localData));

  updateLastUpdated();

// ── Data helpers ─────────────────────────────────────────────
function getItems(catKey) {
  const cat = BASE_DATA[catKey];
  if (!cat) return [];
  return cat.items.map(item => {
    const id = item._id;
    const local = localData[id] || {};
    const remote = remoteStatus[id] ? {_status: remoteStatus[id]} : {};
    return {...item, ...local, ...remote};
  });
}
function getAllItems() {
  return Object.keys(BASE_DATA).flatMap(k => getItems(k));
}

const GROUP_ORDER = ['Plissé / Dupli','Rullegardiner','Lamelgardiner','Persienner'];

function buildSidebar() {
  const groups = {};
  Object.entries(BASE_DATA).forEach(([k, cat]) => {
    if (!groups[cat.group]) groups[cat.group] = [];
    groups[cat.group].push({k, label: cat.label});
  });
  let h = `<div class="sb-item ${!currentCat?'on':''}" onclick="setCat(null)">
    <span>${t('allCats')}</span>
    <span class="sb-count">${getAllItems().length}</span>
  </div>`;
  GROUP_ORDER.forEach(g => {
    if (!groups[g]) return;
    h += `<div class="sb-group-lbl">${t(g)}</div>`;
    groups[g].forEach(({k, label}) => {
      const cnt = getItems(k).filter(i => i._status !== 'discontinued').length;
      h += `<div class="sb-item ${currentCat===k?'on':''}" onclick="setCat('${k}')">
        <span>${t(label)}</span><span class="sb-count">${cnt}</span>
      </div>`;
    });
  });
  document.getElementById('sidebar').innerHTML = h;
}

function renderMain() {
  const area = document.getElementById('mainArea');
  let items = currentCat ? getItems(currentCat) : getAllItems();
  const catLabel = currentCat ? t(BASE_DATA[currentCat].label) : t('allCats');
  const catGroup = currentCat ? t(BASE_DATA[currentCat].group) : '';
  const total = (currentCat ? getItems(currentCat) : getAllItems()).length;
  const actCnt = (currentCat ? getItems(currentCat) : getAllItems()).filter(i=>i._status!=='discontinued').length;
  const disCnt = total - actCnt;

  if (currentFilter==='active') items = items.filter(i=>i._status!=='discontinued');
  if (currentFilter==='discontinued') items = items.filter(i=>i._status==='discontinued');
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    items = items.filter(i =>
      String(i.Dessinnummer||i.Fargenummer||'').includes(q) ||
      String(i.Stofsammensætning||'').toLowerCase().includes(q) ||
      String(i.Komponentfarve||'').toLowerCase().includes(q) ||
      String(i.Fargbeskrivelse||'').toLowerCase().includes(q)
    );
  }
  if (sortCol) {
    items = [...items].sort((a,b) => {
      let va=a[sortCol]??'', vb=b[sortCol]??'';
      if (typeof va==='number'&&typeof vb==='number') return (va-vb)*sortDir;
      return String(va).localeCompare(String(vb))*sortDir;
    });
  }

  const cols = getCols(currentCat);
  const catGroupHtml = catGroup ? '<span>' + catGroup + '</span>' : '';
  let h = `<div class="cat-hdr"><h2>${catLabel}</h2>${catGroupHtml}</div>
  <div class="toolbar">
    <div class="search-wrap">
      <svg class="si" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="searchInput" type="text" placeholder="${t('search')}" value="${currentSearch}" oninput="doSearch(this.value)">
    </div>
    <div class="f-btns">
      <button class="f-btn ${currentFilter==='all'?'on':''}" onclick="setFilter('all')">${t('fAll')} (${total})</button>
      <button class="f-btn ${currentFilter==='active'?'on':''}" onclick="setFilter('active')">${t('fAct')} (${actCnt})</button>
      <button class="f-btn ${currentFilter==='discontinued'?'on':''}" onclick="setFilter('discontinued')">${t('fDis')} (${disCnt})</button>
    </div>
  </div>`;

  if (!items.length) {
    h += `<div class="empty"><p>${t('noFab')}</p></div>`;
    area.innerHTML = h; return;
  }

  h += `<div class="tbl-wrap"><table><thead><tr>`;
  cols.forEach(c => {
    const arr = sortCol===c.key?(sortDir>0?' ↑':' ↓'):'';
    h += `<th class="${c.noSort?'':'sort'}" onclick="${c.noSort?'':'setSort(''+c.key+'')'}">${c.lbl}${arr}</th>`;
  });
  if (isAdmin) h += `<th>${t('cAct')}</th>`;
  h += `</tr></thead><tbody>`;

  items.forEach(item => {
    const disc = item._status==='discontinued';
    h += `<tr class="${disc?'disc':''}">`;
    cols.forEach(c => { h += renderCell(item, c); });
    if (isAdmin) {
      const id = item._id;
      h += disc
        ? `<td><button class="t-btn t-dis" onclick="toggleStatus('${id}')">${t('btnAct')}</button></td>`
        : `<td><button class="t-btn t-act" onclick="toggleStatus('${id}')">${t('btnDis')}</button></td>`;
    }
    h += `</tr>`;
  });
  h += `</tbody></table></div>`;
  h += `<p class="tbl-footer">${t('showing')} ${items.length} ${t('of')} ${total} ${t('fabrics')}</p>`;
  area.innerHTML = h;
}

    lamel_luxury:[...base,{key:'63 mm',lbl:'63mm',render:'chk'},{key:'89 mm',lbl:'89mm',render:'chk'},{key:'127 mm',lbl:'127mm',render:'chk'},{key:'Lystransmission',lbl:'LT',render:'pct'},certsCol,statusCol],
    lamel_struct:[...base,{key:'89 mm',lbl:'89mm',render:'chk'},{key:'Lystransmission',lbl:'LT',render:'pct'},certsCol,statusCol],
    lamel_func: [...base, {key:'63 mm',lbl:'63mm',render:'chk'},{key:'89 mm',lbl:'89mm',render:'chk'},{key:'127 mm',lbl:'127mm',render:'chk'},{key:'Lystransmission',lbl:'LT',render:'pct'},certsCol,statusCol],
    alu:        [{key:'Dessinnummer',lbl:t('cNr'),render:'num'},{key:'Prisgruppe',lbl:t('cPri'),render:'pri'},{key:'Sektion',lbl:t('cSec'),render:'txt'},{key:'16 mm',lbl:'16mm',render:'chk'},{key:'25 mm',lbl:'25mm',render:'chk'},{key:'35 mm',lbl:'35mm',render:'chk'},{key:'50 mm',lbl:'50mm',render:'chk'},{key:'Kædefarve v. kædebetjening',lbl:t('cChain'),render:'txt'},certsS,statusCol],
    tre:        [{key:'Fargenummer',lbl:t('cNr'),render:'num_tre'},{key:'Prisgruppe',lbl:t('cClass'),render:'pri'},{key:'Fargbeskrivelse',lbl:t('cCol'),render:'txt'},{key:'Tretype',lbl:t('cTree'),render:'txt'},{key:'Seksjon',lbl:t('cSec'),render:'txt'},{key:'Maksimal bredde',lbl:t('cMaxW'),render:'plain'},{key:'_certs_tre',lbl:t('cCertsS'),render:'ctre',noSort:true},statusCol],
  };
  if (!catKey) return [{key:'Dessinnummer',lbl:t('cNr'),render:'num'},{key:'Prisgruppe',lbl:t('cPri'),render:'pri'},{key:'Stofsammensætning',lbl:t('cMat'),render:'txt'},{key:'Komponentfarve',lbl:t('cCol'),render:'txt'},{key:'Lystransmission',lbl:'LT',render:'pct'},{key:'_certs',lbl:t('cCerts'),render:'certs',noSort:true},{key:'_status',lbl:t('cStat'),render:'stat',noSort:true}];
  return spec[catKey] || [...base, statusCol];
}

function renderCell(item, c) {
  const v = item[c.key];
  switch(c.render) {
    case 'num':     return `<td class="num">${item.Dessinnummer||'—'}</td>`;
    case 'num_tre': return `<td class="num">${item.Fargenummer||item.Dessinnummer||'—'}</td>`;
    case 'pri':     return v ? `<td><span class="badge b-pri">${v}</span></td>` : '<td>—</td>';
    case 'txt':     return `<td>${v||'—'}</td>`;
    case 'plain':   return `<td>${v!=null?v:'—'}</td>`;
    case 'pct': {
      if (v==null||v==='') return '<td>—</td>';
      const n = typeof v==='number'?(v<=1?Math.round(v*100):v):v;
      return `<td>${n}%</td>`;
    }
    case 'chk':     return `<td style="text-align:center">${v?'<span style="color:var(--bc-green);font-weight:700">✓</span>':'<span style="color:var(--border)">—</span>'}</td>`;
    case 'stat':    return `<td><span class="badge ${item._status==='discontinued'?'b-dis':'b-act'}">${item._status==='discontinued'?t('sDis'):t('sAct')}</span></td>`;
    case 'certs': {
      const b=[];
      if(item['Oeko-Tex']) b.push(`<span class="cert c-oeko">Oeko-Tex</span>`);
      if(item['Greenguard']) b.push(`<span class="cert c-gg">Greenguard</span>`);
      if(item['Cradle-to-Cradle']) b.push(`<span class="cert c-c2c">C2C</span>`);
      if(item['Flammehæmmende']) b.push(`<span class="cert c-fl">Flamme</span>`);
      if(item['Fugtafvisende']) b.push(`<span class="cert c-hu">Fukt</span>`);
      if(item['Velegnet til skærmarbejde']) b.push(`<span class="cert c-sc">Skjerm</span>`);
      if(item['Bæredygtig (Planet)']||item['Bæredygtig (SeaPlanet)']) b.push(`<span class="cert c-su">Planet</span>`);
      return `<td><div class="certs">${b.join('')||'—'}</div></td>`;
    }
    case 'ctre': {
      const b=[];
      if(item['FSC® sertifisert']) b.push(`<span class="cert c-su">FSC®</span>`);
      if(item['Fuktbestandig']) b.push(`<span class="cert c-hu">Fukt</span>`);
      return `<td><div class="certs">${b.join('')||'—'}</div></td>`;
    }
    case 'rext': {
      const f=[];
      if(item['Velegnet til skråvinduer']) f.push(t('pAngle'));
      if(item['Velegnet til skærmarbejde']) f.push(t('pScreen'));
      if(item['Flammehæmmende']) f.push(t('pFlame'));
      if(item['Fugtafvisende']) f.push(t('pMoist'));
      return `<td style="font-size:11px;color:var(--tm)">${f.join(', ')||'—'}</td>`;
    }
    default: return `<td>${v!=null?v:'—'}</td>`;
  }
}

// ── Interactions ──────────────────────────────────────────────
function setFilter(f) { currentFilter=f; renderMain(); }
function doSearch(v) { currentSearch=v; renderMain(); }
function setSort(col) {
  if(sortCol===col) sortDir*=-1; else { sortCol=col; sortDir=1; }
  renderMain();
}

function toggleStatus(id) {
  const item = getAllItems().find(i=>i._id===id);
  if (!item) return;
  const cur = item._status;
  const next = cur==='discontinued'?'active':'discontinued';
  remoteStatus[id] = next;
  if (!localData[id]) localData[id]={};
  localData[id]._status = next;
  buildSidebar(); renderMain();
  notify(cur==='discontinued'?t('nActiv'):t('nDisc'));
  if (supabaseReady) {
    saveToSupabase(id, next).catch(()=>notify('⚠️ Supabase feil – lagret lokalt'));
  } else { saveLocal(); }
}

function showAddForm() { document.getElementById('addForm').classList.add('on'); }
function hideAddForm() { document.getElementById('addForm').classList.remove('on'); }

function addNewItem() {
  const num = document.getElementById('nf_num').value.trim();
  if (!num) { alert(t('confNum')); return; }
  const catKey = currentCat||'plisse';
  const id = `${catKey}_${num}`;
  const newItem = {
    _id:id, _status:document.getElementById('nf_status').value, _custom:true,
    Dessinnummer:num,
    Prisgruppe:document.getElementById('nf_price').value.trim()||null,
    Stofsammensætning:document.getElementById('nf_comp').value.trim()||null,
    Komponentfarve:document.getElementById('nf_color').value.trim()||null,
    Lystransmission:document.getElementById('nf_lt').value?parseFloat(document.getElementById('nf_lt').value):null,
  };
  BASE_DATA[catKey].items.push(newItem);
  if (supabaseReady && newItem._status==='discontinued') {
    saveToSupabase(id,'discontinued').catch(console.error);
  }
  hideAddForm(); buildSidebar(); renderMain();
  notify(`${t('cNr')} ${num} ${t('nAdded')}`);
}

function exportData() {
  const out = {};
  Object.keys(BASE_DATA).forEach(k=>{ out[k]={...BASE_DATA[k],items:getItems(k)}; });
  out._remoteStatus = remoteStatus;
  const blob = new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='kolleksjon_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  notify(t('nExport'));
}

function importData(evt) {
  const file=evt.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=e=>{
    try {
      const d=JSON.parse(e.target.result);
      if (d._remoteStatus) {
        Object.assign(remoteStatus, d._remoteStatus);
        if (supabaseReady) {
          const rows=Object.entries(d._remoteStatus).map(([id,status])=>({id,status}));
          for(let i=0;i<rows.length;i+=100) {
            sbFetch('fabric_status',{method:'POST',prefer:'resolution=merge-duplicates',body:JSON.stringify(rows.slice(i,i+100))}).catch(console.error);
          }
        }
        buildSidebar(); renderMain(); notify(t('nImport'));
      } else { notify(t('nBadFmt')); }
    } catch(err){ alert(err.message); }
  };
  r.readAsText(file);
}

function confirmReset() {
  if(confirm(t('confReset'))) {
    localStorage.removeItem('royal_v3'); localData={};
    if(supabaseReady) {
      Object.keys(remoteStatus).forEach(id=>{ saveToSupabase(id,'active').catch(console.error); });
    }
    remoteStatus={}; buildSidebar(); renderMain(); notify(t('nReset'));
  }
}

// ── Auth ──────────────────────────────────────────────────────
function toggleAdminLogin() {
  if(isAdmin){logout();return;}
  document.getElementById('loginModal').classList.add('on');
  setTimeout(()=>document.getElementById('adminPw').focus(),80);
}
function closeModal() {
  document.getElementById('loginModal').classList.remove('on');
  document.getElementById('adminPw').value='';
  document.getElementById('pwErr').style.display='none';
}
function checkPw() {
  if(document.getElementById('adminPw').value===ADMIN_PW) {
    isAdmin=true; closeModal();
    document.getElementById('adminBtn').classList.add('on');
    document.getElementById('adminBtn').textContent='Admin ✓';
    document.getElementById('adminPanel').classList.add('on');
    renderMain(); notify(t('nLogin'));
  } else {
    document.getElementById('pwErr').style.display='block';
    document.getElementById('adminPw').value='';
  }
}
function logout() {
  isAdmin=false;
  document.getElementById('adminBtn').classList.remove('on');
  document.getElementById('adminBtn').textContent='Admin';
  document.getElementById('adminPanel').classList.remove('on');
  document.getElementById('addForm').classList.remove('on');
  renderMain(); notify(t('nLogout'));
}

// ── Language ──────────────────────────────────────────────────
function toggleLang() {
  lang = lang==='no'?'en':'no';
  const btn=document.getElementById('langBtn');
  btn.textContent = lang==='en'?'🇳🇴 NO':'🇬🇧 EN';
  buildSidebar(); renderMain(); updateLastUpdated();
}

// ── Notification ──────────────────────────────────────────────
let nTimeout;
function notify(msg) {
  const el=document.getElementById('notif');
  el.textContent=msg; el.classList.add('on');
  clearTimeout(nTimeout); nTimeout=setTimeout(()=>el.classList.remove('on'),2600);
}

// ── Last updated ──────────────────────────────────────────────
function updateLastUpdated() {
  const d=localStorage.getItem('royal_upd');
  const el=document.getElementById('lastUpdated');
  if(d) el.textContent=t('lastUpd')+' '+new Date(d).toLocaleDateString(lang==='en'?'en-GB':'nb-NO',{day:'numeric',month:'short',year:'numeric'});
}

// ── Init ──────────────────────────────────────────────────────
loadLocal();
buildSidebar();
renderMain();
updateLastUpdated();

loadFromSupabase().then(()=>{
  buildSidebar(); renderMain();
  const sd=document.getElementById('syncDot');
  if(sd){sd.textContent='● live';sd.className='sync ok';}
}).catch(e=>{
  console.warn('Supabase:', e.message);
  const sd=document.getElementById('syncDot');
  if(sd){sd.textContent='● offline';sd.className='sync err';}
});
</script>
