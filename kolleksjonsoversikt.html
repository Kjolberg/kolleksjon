<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kolleksjonsoversikt – Royal Solskjerming</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #f9f7f4;
  --white: #ffffff;
  --warm-gray: #e8e4de;
  --mid-gray: #c4bdb5;
  --text-primary: #1a1714;
  --text-secondary: #5c564f;
  --text-muted: #9a9089;
  --accent: #8b6f47;
  --accent-light: #f0e9df;
  --active-green: #2d6a4f;
  --active-bg: #e8f5ef;
  --disc-red: #9b2c2c;
  --disc-bg: #fdf0ef;
  --border: #ddd8d0;
  --shadow: 0 2px 12px rgba(26,23,20,0.08);
  --radius: 4px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--text-primary);
  font-size: 13px;
  line-height: 1.5;
  min-height: 100vh;
}

/* HEADER */
.app-header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 20px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}
.app-header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 500;
  letter-spacing: 0.02em;
  color: var(--text-primary);
}
.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.last-updated {
  font-size: 11px;
  color: var(--text-muted);
}

/* ADMIN TOGGLE */
.admin-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  color: var(--text-secondary);
  transition: all 0.2s;
}
.admin-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
.admin-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

/* MODAL */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(26,23,20,0.5);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.modal-overlay.visible { display: flex; }
.modal {
  background: var(--white);
  border-radius: 8px;
  padding: 32px;
  width: 400px;
  max-width: 90vw;
  box-shadow: 0 20px 60px rgba(26,23,20,0.2);
}
.modal h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 500;
  margin-bottom: 20px;
  color: var(--text-primary);
}
.modal input {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  margin-bottom: 12px;
  background: var(--cream);
  color: var(--text-primary);
}
.modal input:focus { outline: none; border-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
.btn-primary {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: var(--radius);
  padding: 8px 20px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
}
.btn-secondary {
  background: none;
  color: var(--text-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  cursor: pointer;
}
.error-msg { color: var(--disc-red); font-size: 12px; margin-top: 4px; }

/* LAYOUT */
.app-body {
  display: flex;
  min-height: calc(100vh - 65px);
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: var(--white);
  border-right: 1px solid var(--border);
  padding: 24px 0;
  position: sticky;
  top: 65px;
  height: calc(100vh - 65px);
  overflow-y: auto;
  flex-shrink: 0;
}
.sidebar-group { margin-bottom: 6px; }
.sidebar-group-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 8px 20px 4px;
}
.sidebar-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 20px;
  cursor: pointer;
  color: var(--text-secondary);
  font-size: 12.5px;
  transition: all 0.15s;
  border-left: 2px solid transparent;
}
.sidebar-item:hover { background: var(--accent-light); color: var(--text-primary); }
.sidebar-item.active {
  background: var(--accent-light);
  color: var(--accent);
  border-left-color: var(--accent);
  font-weight: 500;
}
.sidebar-count {
  font-size: 10px;
  background: var(--warm-gray);
  color: var(--text-muted);
  border-radius: 10px;
  padding: 1px 7px;
  min-width: 22px;
  text-align: center;
}

/* MAIN */
.main-content { flex: 1; padding: 28px 32px; overflow: hidden; }

/* TOOLBAR */
.toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.search-box {
  flex: 1;
  min-width: 200px;
  max-width: 360px;
  position: relative;
}
.search-box input {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 14px 8px 36px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  background: var(--white);
  color: var(--text-primary);
  transition: border-color 0.2s;
}
.search-box input:focus { outline: none; border-color: var(--accent); }
.search-icon {
  position: absolute;
  left: 11px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  pointer-events: none;
}

.filter-btns { display: flex; gap: 4px; }
.filter-btn {
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  background: var(--white);
  color: var(--text-secondary);
  transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

.toolbar-right { display: flex; gap: 8px; margin-left: auto; }

/* STATS BAR */
.stats-bar {
  display: flex;
  gap: 20px;
  margin-bottom: 16px;
  padding: 12px 16px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.stat { display: flex; align-items: center; gap: 8px; }
.stat-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1;
}
.stat-label { font-size: 11px; color: var(--text-muted); }
.stat-divider { width: 1px; background: var(--border); align-self: stretch; }

/* TABLE */
.table-wrap {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  overflow-x: auto;
}
table { width: 100%; border-collapse: collapse; min-width: 800px; }
thead tr { background: var(--cream); border-bottom: 2px solid var(--border); }
thead th {
  padding: 10px 14px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-muted);
  white-space: nowrap;
}
thead th.sortable { cursor: pointer; user-select: none; }
thead th.sortable:hover { color: var(--accent); }
tbody tr {
  border-bottom: 1px solid var(--warm-gray);
  transition: background 0.1s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--cream); }
tbody tr.discontinued { opacity: 0.6; }
td {
  padding: 9px 14px;
  font-size: 12.5px;
  color: var(--text-secondary);
  vertical-align: middle;
}
td.num { font-family: 'DM Sans', sans-serif; font-weight: 500; color: var(--text-primary); }
td.composition { max-width: 140px; }

/* BADGES */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 10.5px;
  font-weight: 600;
  white-space: nowrap;
}
.badge-active { background: var(--active-bg); color: var(--active-green); }
.badge-disc { background: var(--disc-bg); color: var(--disc-red); }
.badge-price {
  background: var(--accent-light);
  color: var(--accent);
  font-size: 11px;
}
.cert-badges { display: flex; flex-wrap: wrap; gap: 3px; }
.cert {
  font-size: 9.5px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 3px;
  white-space: nowrap;
}
.cert-oeko { background: #e8f4ea; color: #2d6a4f; }
.cert-green { background: #eaf4e8; color: #276221; }
.cert-c2c { background: #e8f0f9; color: #1d4e89; }
.cert-flame { background: #fef3e8; color: #c05e0a; }
.cert-humid { background: #e8f4f9; color: #1a6e8a; }
.cert-screen { background: #f3e8f9; color: #6b21a8; }
.cert-sustain { background: #e8f9e8; color: #166534; }

/* ADMIN ACTIONS */
.admin-actions { display: flex; gap: 6px; }
.toggle-btn {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: var(--radius);
  cursor: pointer;
  border: 1px solid;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  transition: all 0.15s;
}
.toggle-active { border-color: var(--disc-red); color: var(--disc-red); background: none; }
.toggle-active:hover { background: var(--disc-bg); }
.toggle-disc { border-color: var(--active-green); color: var(--active-green); background: none; }
.toggle-disc:hover { background: var(--active-bg); }

/* CATEGORY HEADER */
.cat-header {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 6px;
}
.cat-header h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-weight: 500;
  color: var(--text-primary);
}
.cat-header span {
  font-size: 12px;
  color: var(--text-muted);
}

/* IMPORT/EXPORT PANEL */
.admin-panel {
  display: none;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 16px;
}
.admin-panel.visible { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.admin-panel-label { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-right: 4px; }

/* ADD FORM */
.add-form {
  display: none;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
}
.add-form.visible { display: block; }
.add-form h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  margin-bottom: 16px;
  color: var(--text-primary);
}
.form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
.form-field label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 4px; font-weight: 500; }
.form-field input, .form-field select {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 7px 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  background: var(--cream);
}
.form-field input:focus, .form-field select:focus { outline: none; border-color: var(--accent); }

/* EMPTY */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty-state svg { margin-bottom: 12px; opacity: 0.4; }

/* RESPONSIVE */
@media (max-width: 900px) {
  .sidebar { display: none; }
  .main-content { padding: 20px 16px; }
}

/* NOTIFICATION */
.notification {
  position: fixed;
  bottom: 24px; right: 24px;
  background: var(--text-primary);
  color: white;
  padding: 10px 18px;
  border-radius: var(--radius);
  font-size: 13px;
  transform: translateY(60px);
  opacity: 0;
  transition: all 0.3s;
  z-index: 2000;
}
.notification.show { transform: translateY(0); opacity: 1; }

/* TOOLTIP */
[title] { cursor: help; }
</style>
</head>
<body>

<header class="app-header">
  <h1>Kolleksjonsoversikt</h1>
  <div class="header-right">
    <span class="last-updated" id="lastUpdated"></span>
    <button class="admin-btn" id="adminToggleBtn" onclick="toggleAdminLogin()">Admin</button>
  </div>
</header>

<div class="app-body">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content">
    <div class="admin-panel" id="adminPanel">
      <span class="admin-panel-label">Admin:</span>
      <button class="btn-primary" onclick="showAddForm()" style="font-size:12px;padding:6px 14px;">+ Legg til duk</button>
      <button class="btn-secondary" style="font-size:12px;padding:6px 14px;" onclick="exportData()">↓ Eksporter JSON</button>
      <label class="btn-secondary" style="font-size:12px;padding:6px 14px;cursor:pointer;">
        ↑ Importer JSON <input type="file" accept=".json" onchange="importData(event)" style="display:none">
      </label>
      <button class="btn-secondary" style="font-size:12px;padding:6px 14px;color:var(--disc-red)" onclick="confirmReset()">Tilbakestill data</button>
      <span style="font-size:11px;color:var(--text-muted);margin-left:auto">🔒 Logg ut: <a href="#" onclick="logout()" style="color:var(--accent)">klikk her</a></span>
    </div>
    <div class="add-form" id="addForm">
      <h3>Legg til ny duk</h3>
      <div class="form-grid">
        <div class="form-field"><label>Dessinnummer *</label><input id="nf_num" placeholder="f.eks. 41600"></div>
        <div class="form-field"><label>Prisgruppe</label><input id="nf_price" placeholder="A, B, C..."></div>
        <div class="form-field"><label>Stofsammensætning</label><input id="nf_comp" placeholder="100% PES"></div>
        <div class="form-field"><label>Komponentfarve</label><input id="nf_color" placeholder="hvid, beige..."></div>
        <div class="form-field"><label>Lystransmission</label><input id="nf_lt" type="number" min="0" max="1" step="0.01" placeholder="0.00–1.00"></div>
        <div class="form-field">
          <label>Status</label>
          <select id="nf_status"><option value="active">Aktiv</option><option value="discontinued">Utgått</option></select>
        </div>
      </div>
      <div style="margin-top:14px;display:flex;gap:8px">
        <button class="btn-primary" onclick="addNewItem()">Lagre</button>
        <button class="btn-secondary" onclick="hideAddForm()">Avbryt</button>
      </div>
    </div>
    <div id="mainArea"></div>
  </main>
</div>

<!-- Login Modal -->
<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <h2>Admin-tilgang</h2>
    <p style="font-size:12px;color:var(--text-muted);margin-bottom:16px">Skriv inn passord for å redigere kolleksjonen.</p>
    <input type="password" id="adminPassword" placeholder="Passord" onkeydown="if(event.key==='Enter')checkPassword()">
    <div class="error-msg" id="pwError" style="display:none">Feil passord. Prøv igjen.</div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Avbryt</button>
      <button class="btn-primary" onclick="checkPassword()">Logg inn</button>
    </div>
  </div>
</div>

<!-- Notification -->
<div class="notification" id="notification"></div>

const ADMIN_PASSWORD = 'Royal2026';

let isAdmin = false;
let currentCategory = null;
let currentFilter = 'active';
let currentSearch = '';
let sortCol = null, sortDir = 1;
let userData = {}; // overrides: { id: { _status, ...extra fields } }

function loadUserData() {
  try {
    const s = localStorage.getItem('royal_collection_v2');
    if (s) userData = JSON.parse(s);
  } catch(e) {}
}

function saveUserData() {
  localStorage.setItem('royal_collection_v2', JSON.stringify(userData));
  localStorage.setItem('royal_lastUpdate', new Date().toISOString());
  updateLastUpdated();
}

function updateLastUpdated() {
  const d = localStorage.getItem('royal_lastUpdate');
  const el = document.getElementById('lastUpdated');
  if (d) {
    const dt = new Date(d);
    el.textContent = 'Sist oppdatert: ' + dt.toLocaleDateString('nb-NO', {day:'numeric',month:'short',year:'numeric'});
  }
}

function getItems(catKey) {
  const cat = BASE_DATA[catKey];
  if (!cat) return [];
  return cat.items.map(item => {
    const id = item._id;
    const override = userData[id] || {};
    return { ...item, ...override };
  });
}

function getAllItems() {
  const all = [];
  Object.keys(BASE_DATA).forEach(k => all.push(...getItems(k)));
  return all;
}

// ============================================================
// SIDEBAR
// ============================================================
const GROUP_ORDER = ['Plissé / Dupli', 'Rullegardiner', 'Lamelgardiner', 'Persienner'];

function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  const groups = {};
  Object.entries(BASE_DATA).forEach(([key, cat]) => {
    if (!groups[cat.group]) groups[cat.group] = [];
    groups[cat.group].push({ key, label: cat.label });
  });

  let html = '';
  html += `<div class="sidebar-item ${!currentCategory ? 'active' : ''}" onclick="setCategory(null)">
    <span>Alle kategorier</span>
    <span class="sidebar-count">${getAllItems().length}</span>
  </div>`;

  GROUP_ORDER.forEach(g => {
    if (!groups[g]) return;
    html += `<div class="sidebar-group">
      <div class="sidebar-group-label">${g}</div>`;
    groups[g].forEach(({ key, label }) => {
      const count = getItems(key).filter(i => i._status !== 'discontinued').length;
      const isActive = currentCategory === key;
      html += `<div class="sidebar-item ${isActive ? 'active' : ''}" onclick="setCategory('${key}')">
        <span>${label}</span>
        <span class="sidebar-count">${count}</span>
      </div>`;
    });
    html += `</div>`;
  });
  sidebar.innerHTML = html;
}

function setCategory(key) {
  currentCategory = key;
  currentSearch = '';
  const el = document.getElementById('searchInput');
  if (el) el.value = '';
  buildSidebar();
  renderMain();
}

function renderMain() {
  const area = document.getElementById('mainArea');

  let items = currentCategory ? getItems(currentCategory) : getAllItems();
  const catLabel = currentCategory ? BASE_DATA[currentCategory].label : 'Alle kategorier';
  const catGroup = currentCategory ? BASE_DATA[currentCategory].group : '';

  // Filter
  if (currentFilter === 'active') items = items.filter(i => i._status !== 'discontinued');
  if (currentFilter === 'discontinued') items = items.filter(i => i._status === 'discontinued');

  // Search
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    items = items.filter(i => {
      const num = String(i.Dessinnummer || i.Fargenummer || '');
      const comp = String(i.Stofsammensætning || i.Stofsammensætning || '').toLowerCase();
      const color = String(i.Komponentfarve || '').toLowerCase();
      const desc = String(i.Fargbeskrivelse || '').toLowerCase();
      return num.includes(q) || comp.includes(q) || color.includes(q) || desc.includes(q);
    });
  }

  // Sort
  if (sortCol) {
    items = [...items].sort((a, b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (va == null) va = '';
      if (vb == null) vb = '';
      if (typeof va === 'number' && typeof vb === 'number') return (va - vb) * sortDir;
      return String(va).localeCompare(String(vb)) * sortDir;
    });
  }

  const total = currentCategory ? getItems(currentCategory).length : getAllItems().length;
  const activeCount = (currentCategory ? getItems(currentCategory) : getAllItems()).filter(i => i._status !== 'discontinued').length;
  const discCount = total - activeCount;

  // Determine columns
  const cols = getColumns(currentCategory);

  let html = `
  <div class="cat-header">
    <h2>${catLabel}</h2>
    <span>${catGroup}</span>
  </div>
  <div class="toolbar">
    <div class="search-box">
      <svg class="search-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="searchInput" type="text" placeholder="Søk på nummer, materiale, farge…" value="${currentSearch}" oninput="onSearch(this.value)">
    </div>
    <div class="filter-btns">
      <button class="filter-btn ${currentFilter==='all'?'active':''}" onclick="setFilter('all')">Alle (${total})</button>
      <button class="filter-btn ${currentFilter==='active'?'active':''}" onclick="setFilter('active')">Aktive (${activeCount})</button>
      <button class="filter-btn ${currentFilter==='discontinued'?'active':''}" onclick="setFilter('discontinued')">Utgåtte (${discCount})</button>
    </div>
  </div>`;

  if (items.length === 0) {
    html += `<div class="empty-state">
      <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      <p>Ingen duker funnet</p>
    </div>`;
    area.innerHTML = html;
    return;
  }

  html += `<div class="table-wrap"><table>
  <thead><tr>`;
  cols.forEach(c => {
    const arrow = sortCol === c.key ? (sortDir > 0 ? ' ↑' : ' ↓') : '';
    html += `<th class="${c.sort!==false?'sortable':''}" onclick="${c.sort!==false?`setSort('${c.key}')`:''}">` + c.label + arrow + `</th>`;
  });
  if (isAdmin) html += `<th>Handling</th>`;
  html += `</tr></thead><tbody>`;

  items.forEach(item => {
    const isDisc = item._status === 'discontinued';
    html += `<tr class="${isDisc?'discontinued':''}">`;
    cols.forEach(c => {
      html += renderCell(item, c);
    });
    if (isAdmin) {
      const id = item._id;
      if (isDisc) {
        html += `<td><button class="toggle-btn toggle-disc" onclick="toggleStatus('${id}')">↺ Aktiver</button></td>`;
      } else {
        html += `<td><button class="toggle-btn toggle-active" onclick="toggleStatus('${id}')">Sett utgått</button></td>`;
      }
    }
    html += `</tr>`;
  });

  html += `</tbody></table></div>`;
  html += `<p style="margin-top:10px;font-size:11px;color:var(--text-muted)">Viser ${items.length} av ${total} duker</p>`;

  area.innerHTML = html;
}

function renderCell(item, col) {
  const v = item[col.key];

  if (col.render === 'num') {
    const num = item.Dessinnummer || item.Fargenummer || '—';
    return `<td class="num">${num}</td>`;
  }
  if (col.render === 'num_plain') {
    return `<td>${v != null ? v : '—'}</td>`;
  }
  if (col.render === 'text') {
    return `<td>${v || '—'}</td>`;
  }
  if (col.render === 'badge_price') {
    return v ? `<td><span class="badge badge-price">${v}</span></td>` : '<td>—</td>';
  }
  if (col.render === 'pct') {
    if (v == null || v === '') return '<td>—</td>';
    const n = typeof v === 'number' ? (v <= 1 ? Math.round(v*100) : v) : v;
    return `<td>${n}%</td>`;
  }
  if (col.render === 'pct_str') {
    return `<td>${v || '—'}</td>`;
  }
  if (col.render === 'check') {
    return `<td style="text-align:center">${v ? '<span style="color:var(--active-green);font-weight:600">✓</span>' : '<span style="color:var(--mid-gray)">—</span>'}</td>`;
  }
  if (col.render === 'status') {
    const isDisc = item._status === 'discontinued';
    return `<td><span class="badge ${isDisc?'badge-disc':'badge-active'}">${isDisc?'Utgått':'Aktiv'}</span></td>`;
  }
  if (col.render === 'certs') {
    const badges = [];
    if (item['Oeko-Tex']) badges.push(`<span class="cert cert-oeko" title="Oeko-Tex">Oeko-Tex</span>`);
    if (item['Greenguard']) badges.push(`<span class="cert cert-green" title="Greenguard">Greenguard</span>`);
    if (item['Cradle-to-Cradle']) badges.push(`<span class="cert cert-c2c" title="Cradle-to-Cradle">C2C</span>`);
    if (item['Flammehæmmende']) badges.push(`<span class="cert cert-flame" title="Flammehemmende">Flamme</span>`);
    if (item['Fugtafvisende']) badges.push(`<span class="cert cert-humid" title="Fuktavvisende">Fukt</span>`);
    if (item['Velegnet til skærmarbejde']) badges.push(`<span class="cert cert-screen" title="Skjermarbeid">Skjerm</span>`);
    if (item['Bæredygtig (Planet)'] || item['Bæredygtig (SeaPlanet)']) badges.push(`<span class="cert cert-sustain" title="Bæredygtig">Planet</span>`);
    return `<td><div class="cert-badges">${badges.join('')||'—'}</div></td>`;
  }
  if (col.render === 'certs_tre') {
    const badges = [];
    if (item['FSC® sertifisert']) badges.push(`<span class="cert cert-sustain">FSC®</span>`);
    if (item['Fuktbestandig']) badges.push(`<span class="cert cert-humid">Fukt</span>`);
    return `<td><div class="cert-badges">${badges.join('')||'—'}</div></td>`;
  }
  if (col.render === 'rulle_extra') {
    const f = [];
    if (item['Velegnet til skråvinduer']) f.push('Skrå');
    if (item['Velegnet til skærmarbejde']) f.push('Skjerm');
    if (item['Flammehæmmende']) f.push('Flamme');
    if (item['Fugtafvisende']) f.push('Fukt');
    return `<td style="font-size:11px;color:var(--text-muted)">${f.join(', ')||'—'}</td>`;
  }
  return `<td>${v != null ? v : '—'}</td>`;
}

// ============================================================
// INTERACTIONS
// ============================================================
function setFilter(f) {
  currentFilter = f;
  renderMain();
}

function onSearch(v) {
  currentSearch = v;
  renderMain();
}

function setSort(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  renderMain();
}

function toggleStatus(id) {
  const allItems = getAllItems();
  const item = allItems.find(i => i._id === id);
  if (!item) return;
  const current = item._status;
  if (!userData[id]) userData[id] = {};
  userData[id]._status = current === 'discontinued' ? 'active' : 'discontinued';
  saveUserData();
  buildSidebar();
  renderMain();
  showNotification(current === 'discontinued' ? 'Duk aktivert ✓' : 'Duk satt som utgått');
}

function showAddForm() {
  document.getElementById('addForm').classList.add('visible');
  document.getElementById('nf_num').focus();
}
function hideAddForm() {
  document.getElementById('addForm').classList.remove('visible');
}

function addNewItem() {
  const num = document.getElementById('nf_num').value.trim();
  if (!num) { alert('Dessinnummer er påkrevd'); return; }

  const catKey = currentCategory || 'plisse';
  const id = `${catKey}_${num}`;
  const newItem = {
    _id: id,
    Dessinnummer: num,
    Prisgruppe: document.getElementById('nf_price').value.trim() || null,
    Stofsammensætning: document.getElementById('nf_comp').value.trim() || null,
    Komponentfarve: document.getElementById('nf_color').value.trim() || null,
    Lystransmission: document.getElementById('nf_lt').value ? parseFloat(document.getElementById('nf_lt').value) : null,
    _status: document.getElementById('nf_status').value,
    _custom: true,
  };

  if (!userData['_custom']) userData['_custom'] = [];
  userData['_custom'].push({ catKey, item: newItem });
  
  // Also store in BASE_DATA in memory
  BASE_DATA[catKey].items.push(newItem);

  saveUserData();
  hideAddForm();
  buildSidebar();
  renderMain();
  showNotification(`Duk ${num} lagt til ✓`);
}

function exportData() {
  const all = {};
  Object.keys(BASE_DATA).forEach(k => {
    all[k] = { ...BASE_DATA[k], items: getItems(k) };
  });
  all._userOverrides = userData;
  const blob = new Blob([JSON.stringify(all, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'kolleksjon_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  showNotification('JSON eksportert ✓');
}

function importData(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      if (d._userOverrides) {
        userData = d._userOverrides;
        saveUserData();
        buildSidebar();
        renderMain();
        showNotification('Data importert ✓');
      } else {
        showNotification('Ukjent format – ingen data importert');
      }
    } catch(err) {
      alert('Kunne ikke lese filen: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function confirmReset() {
  if (confirm('Er du sikker? Dette tilbakestiller alle status-endringer og tillagte duker.')) {
    localStorage.removeItem('royal_collection_v2');
    localStorage.removeItem('royal_lastUpdate');
    userData = {};
    // Remove custom items
    Object.keys(BASE_DATA).forEach(k => {
      BASE_DATA[k].items = BASE_DATA[k].items.filter(i => !i._custom);
    });
    buildSidebar();
    renderMain();
    showNotification('Data tilbakestilt');
  }
}

// ============================================================
// ADMIN AUTH
// ============================================================
function toggleAdminLogin() {
  if (isAdmin) { logout(); return; }
  document.getElementById('loginModal').classList.add('visible');
  setTimeout(() => document.getElementById('adminPassword').focus(), 100);
}

function closeModal() {
  document.getElementById('loginModal').classList.remove('visible');
  document.getElementById('adminPassword').value = '';
  document.getElementById('pwError').style.display = 'none';
}

function checkPassword() {
  const pw = document.getElementById('adminPassword').value;
  if (pw === ADMIN_PASSWORD) {
    isAdmin = true;
    closeModal();
    document.getElementById('adminToggleBtn').classList.add('active');
    document.getElementById('adminToggleBtn').textContent = 'Admin ✓';
    document.getElementById('adminPanel').classList.add('visible');
    renderMain();
    showNotification('Innlogget som admin');
  } else {
    document.getElementById('pwError').style.display = 'block';
    document.getElementById('adminPassword').value = '';
  }
}

function logout() {
  isAdmin = false;
  document.getElementById('adminToggleBtn').classList.remove('active');
  document.getElementById('adminToggleBtn').textContent = 'Admin';
  document.getElementById('adminPanel').classList.remove('visible');
  document.getElementById('addForm').classList.remove('visible');
  renderMain();
  showNotification('Logget ut');
}

// ============================================================
// NOTIFICATIONS
// ============================================================
let notifTimeout;
function showNotification(msg) {
  const el = document.getElementById('notification');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(notifTimeout);
  notifTimeout = setTimeout(() => el.classList.remove('show'), 2500);
}

// ============================================================
// INIT
// ============================================================
loadUserData();
buildSidebar();
renderMain();
updateLastUpdated();
</script>
